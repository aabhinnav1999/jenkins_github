name: Django CI

on:
  push:
    branches: [ "master" ]

jobs:
  
  code-checkout:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        cd django_app
        python -m pip install --upgrade pip
        pip install -r requirements.txt
